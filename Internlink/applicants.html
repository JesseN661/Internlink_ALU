<!DOCTYPE html>
<html>
<head>

margin:0;

}

.section{

}

.cards{
display:flex;
justify-content:center;

}

.card{

padding:20px;
width:250px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

button{
background:#6c63ff;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#574fd6;
}

</style>

</head>

<body>

<section class="section">

<h2>Applicants – Software Intern</h2>

<div class="cards">

<div class="card">

<h3>Liata Ornella</h3>

<p>University: ALU</p>
<p>Skills: JavaScript, React</p>

<button>View Resume</button>
<button>Accept</button>
<button>Reject</button>

</div>

<div class="card">

<h3>Jesse Nkubito</h3>

<p>University: UR</p>
<p>Skills: Python, HTML</p>

<button>View Resume</button>

</div>

</div>

</section>

</body>
</html>
